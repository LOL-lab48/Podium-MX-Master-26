<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Podium MX Master 26</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>Podium MX Master 26</h1>
    <p>Welcome to the ultimate motocross manager game!</p>

    <!-- Tabs -->
    <div id="tabs">
        <button id="tabMain" onclick="showScreen('mainScreen')" class="active">Home</button>
        <button id="tabTeam" onclick="showScreen('teamScreen')">Team</button>
        <button id="tabMarket" onclick="showScreen('marketScreen')">Market</button>
        <button id="tabRace" onclick="showScreen('raceScreen')">Race</button>
        <button id="tabStandings" onclick="showScreen('standingsScreen')">Standings</button>
    </div>

    <!-- Screens -->
    <div id="screens">

        <!-- Main/Home Screen -->
        <div id="mainScreen" class="screen active">
            <h2>Home</h2>
            <p>Manage your team, compete in races, and climb the standings!</p>
            <div id="news">
                <h3>News</h3>
                <p>Loading...</p>
            </div>
        </div>

        <!-- Team Management Screen -->
        <div id="teamScreen" class="screen">
            <h2>Your Team</h2>
            <div id="teamInfo"></div>
            <button onclick="upgradeBike()">Upgrade Bike</button>
            <button onclick="hireStaff()">Hire Staff</button>
        </div>

        <!-- Market Screen -->
        <div id="marketScreen" class="screen">
            <h2>Market</h2>
            <div id="marketList"></div>
        </div>

        <!-- Race Screen -->
        <div id="raceScreen" class="screen">
            <h2>Race</h2>
            <button onclick="runRace()">Run Race</button>
            <div id="raceResults"></div>
            <div id="raceRecap"></div>
        </div>

        <!-- Standings Screen -->
        <div id="standingsScreen" class="screen">
            <h2>Standings</h2>
            <div id="standingsList"></div>
        </div>

    </div>

    <script src="script.js"></script>
</body>
</html>
