<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Podium MX Master 26</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            padding: 20px;
        }
        .screen {
            display: none;
        }
        .hidden {
            display: none;
        }
        .screen.active {
            display: block;
        }
        #teamInfo, #marketList, #standingsList, #news {
            margin-bottom: 20px;
        }
    </style>
</head>
<body>

    <div id="mainScreen" class="screen active">
        <h1>Podium MX Master 26</h1>
        <p>Welcome to the ultimate motocross manager game!</p>
        <button onclick="showScreen('teamScreen')">Manage Team</button>
        <button onclick="showScreen('marketScreen')">Market</button>
        <button onclick="showScreen('raceScreen')">Race</button>
        <button onclick="showScreen('standingsScreen')">Standings</button>
    </div>

    <!-- Team Management Screen -->
    <div id="teamScreen" class="screen">
        <h2>Your Team</h2>
        <div id="teamInfo"></div>
        <button onclick="showScreen('marketScreen')">Go to Market</button>
        <button onclick="showScreen('raceScreen')">Go to Race</button>
    </div>

    <!-- Market Screen -->
    <div id="marketScreen" class="screen">
        <h2>Market</h2>
        <div id="marketList"></div>
        <button onclick="showScreen('teamScreen')">Back to Team</button>
        <button onclick="showScreen('raceScreen')">Go to Race</button>
    </div>

    <!-- Race Screen -->
    <div id="raceScreen" class="screen">
        <h2>Race</h2>
        <button onclick="runRace()">Run Race</button>
        <div id="raceResults"></div>
        <div id="raceRecap"></div>
        <button onclick="showScreen('teamScreen')">Back to Team</button>
        <button onclick="showScreen('marketScreen')">Go to Market</button>
    </div>

    <!-- Standings Screen -->
    <div id="standingsScreen" class="screen">
        <h2>Standings</h2>
        <div id="standingsList"></div>
        <button onclick="showScreen('mainScreen')">Back to Main</button>
    </div>

    <div id="news">
        <h3>News</h3>
        <p>Loading...</p>
    </div>

    <script src="game.js"></script>
</body>
</html>
