<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Podium MX Master 26</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <h1>Podium MX Master 26</h1>
</header>

<nav id="tabs">
    <button onclick="showScreen('homeScreen')" class="active">Home</button>
    <button onclick="showScreen('teamScreen')">Team</button>
    <button onclick="showScreen('marketScreen')">Market</button>
    <button onclick="showScreen('raceScreen')">Race</button>
    <button onclick="showScreen('standingsScreen')">Standings</button>
</nav>

<main>
    <section id="homeScreen" class="screen active">
        <h2>Home</h2>
        <div id="newsFeed">
            <h3>News</h3>
            <p>Loading...</p>
        </div>
        <p>Money: $<span id="moneyDisplay">0</span> | Reputation: <span id="repDisplay">0</span></p>
    </section>

    <section id="teamScreen" class="screen">
        <h2>Your Team</h2>
        <div id="teamInfo"></div>
        <div id="teamActions">
            <button onclick="upgradeBike()">Upgrade Bike</button>
            <button onclick="hireStaff()">Hire Staff</button>
        </div>
    </section>

    <section id="marketScreen" class="screen">
        <h2>Market</h2>
        <div id="marketList"></div>
    </section>

    <section id="raceScreen" class="screen">
        <h2>Race</h2>
        <button onclick="runRace()">Run Next Race</button>
        <div id="raceResults"></div>
        <div id="raceRecap"></div>
    </section>

    <section id="standingsScreen" class="screen">
        <h2>Standings</h2>
        <div id="standingsList"></div>
    </section>
</main>

<script src="script.js"></script>
</body>
</html>
